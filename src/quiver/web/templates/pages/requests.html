{% extends "base.html" %}
{% block title %}Intel Requests — Quiver C2{% endblock %}

{% block content %}
<h1>Intel Request Queue</h1>

<section>
    <h2>Pending Requests <span class="status-badge pending" id="pending-count">{{ pending|length }}</span></h2>
    <div id="request-queue">
        {% include "partials/request_queue.html" %}
    </div>
</section>

<hr>

<section>
    <h2>All Requests</h2>
    <div id="all-requests">
        <p aria-busy="true">Loading...</p>
    </div>
</section>

<script>
(function() {
    // --- Pending queue: incremental sync, never touches existing cards ---
    var syncUrl = "{{ url_for('requests.queue_sync') }}";
    var queue = document.getElementById('request-queue');

    function getKnownIds() {
        var cards = queue.querySelectorAll('.request-card');
        var ids = [];
        for (var i = 0; i < cards.length; i++) {
            var id = cards[i].id.replace('request-card-', '');
            if (id) ids.push(id);
        }
        return ids;
    }

    function syncQueue() {
        var known = getKnownIds();
        fetch(syncUrl + '?known=' + known.join(','))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                document.getElementById('pending-count').textContent = data.pending_count;

                // Remove resolved cards (resolved by any operator)
                var pendingSet = new Set(data.pending_ids.map(String));
                var cards = queue.querySelectorAll('.request-card');
                for (var i = 0; i < cards.length; i++) {
                    var cardId = cards[i].id.replace('request-card-', '');
                    if (!pendingSet.has(cardId)) {
                        cards[i].remove();
                    }
                }

                // Auto-remove resolved notices after they've been visible
                var notices = queue.querySelectorAll('.request-resolved-notice');
                for (var i = 0; i < notices.length; i++) {
                    if (!notices[i].dataset.fadeScheduled) {
                        notices[i].dataset.fadeScheduled = '1';
                        scheduleRemoval(notices[i]);
                    }
                }

                // Append new cards (oldest first — server sends them in order)
                if (data.new_html) {
                    var noMsg = document.getElementById('no-pending-msg');
                    if (noMsg) noMsg.remove();
                    queue.insertAdjacentHTML('beforeend', data.new_html);
                    htmx.process(queue);
                }

                if (data.pending_ids.length === 0
                    && !queue.querySelector('.request-card')
                    && !queue.querySelector('.request-resolved-notice')
                    && !document.getElementById('no-pending-msg')) {
                    queue.innerHTML = '<p id="no-pending-msg">No pending requests.</p>';
                }
            })
            .catch(function(err) { console.error('Queue sync error:', err); });
    }

    // Also fade notices created by this operator's form submissions
    var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
            for (var j = 0; j < mutations[i].addedNodes.length; j++) {
                var node = mutations[i].addedNodes[j];
                if (node.classList && node.classList.contains('request-resolved-notice')) {
                    scheduleRemoval(node);
                }
            }
        }
    });
    observer.observe(queue, { childList: true });

    function scheduleRemoval(el) {
        setTimeout(function() {
            el.style.transition = 'opacity 0.5s';
            el.style.opacity = '0';
            setTimeout(function() { el.remove(); }, 500);
        }, 3000);
    }

    setInterval(syncQueue, 3000);

    // --- All Requests: paginated, auto-refreshes current page ---
    var allDiv = document.getElementById('all-requests');
    var allCurrentPage = 1;
    var allUrl = "{{ url_for('requests.all_partial') }}";

    function getExpanded(container) {
        var keys = [];
        container.querySelectorAll('.expandable.open').forEach(function(el) {
            if (el.dataset.expand) keys.push(el.dataset.expand);
        });
        return keys;
    }

    function restoreExpanded(container, keys) {
        keys.forEach(function(key) {
            var el = container.querySelector('[data-expand="' + key + '"]');
            if (el) el.classList.add('open');
        });
    }

    function loadAllRequests(page) {
        allCurrentPage = page;
        var expandedBefore = getExpanded(allDiv);
        fetch(allUrl + '?page=' + page)
            .then(function(r) { return r.text(); })
            .then(function(html) {
                allDiv.innerHTML = html;
                restoreExpanded(allDiv, expandedBefore);
                allDiv.querySelectorAll('[data-page]').forEach(function(link) {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        loadAllRequests(parseInt(this.dataset.page));
                    });
                });
            });
    }

    loadAllRequests(1);
    setInterval(function() { loadAllRequests(allCurrentPage); }, 5000);
})();
</script>
{% endblock %}
