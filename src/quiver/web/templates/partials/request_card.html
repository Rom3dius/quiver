<div class="request-card" id="request-card-{{ req.id }}">
    <div class="flex-between">
        <div>
            <strong>{{ teams_by_id.get(req.team_id).name if teams_by_id.get(req.team_id) else 'Unknown' }}</strong>
            <span class="timestamp">{{ req.created_at.strftime('%H:%M:%S') }}</span>
            <span class="status-badge pending">pending</span>
        </div>
        <small>#{{ req.id }}</small>
    </div>
    <p>{{ req.content }}</p>
    <form hx-post="{{ url_for('requests.resolve', request_id=req.id) }}" hx-target="#request-card-{{ req.id }}" hx-swap="outerHTML" hx-encoding="multipart/form-data">
        <textarea name="response" placeholder="Response to team (optional)..." rows="2"></textarea>
        <label class="attach-label">
            Attach files
            <input type="file" name="attachments" multiple accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx">
        </label>
        <div class="flex-row">
            <button type="submit" name="status" value="approved" class="outline">Approve</button>
            <button type="submit" name="status" value="denied" class="outline secondary">Deny</button>
        </div>
    </form>
</div>
