<table>
    <thead>
        <tr>
            <th class="icon-col"></th>
            <th>Time</th>
            <th>Event</th>
            <th>Team</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% include "partials/event_table.html" %}
    </tbody>
</table>
{% if total_pages > 1 %}
<nav class="flex-center">
    {% if page > 1 %}
    <a data-page="{{ page - 1 }}" role="button" class="outline" href="#">&laquo; Prev</a>
    {% endif %}
    <span class="page-info">Page {{ page }} of {{ total_pages }} ({{ total }} total)</span>
    {% if page < total_pages %}
    <a data-page="{{ page + 1 }}" role="button" class="outline" href="#">Next &raquo;</a>
    {% endif %}
</nav>
{% endif %}
